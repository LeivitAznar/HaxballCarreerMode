kind = "web"
previewPath = "/"
title = "Football Arcade – Career Mode"
version = "1.0.0"
id = "artifacts/football-game"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23691

[services.development]
run = "pnpm --filter @workspace/football-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/football-game", "run", "build" ]
serve = "static"
publicDir = "artifacts/football-game/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23691"
BASE_PATH = "/"
